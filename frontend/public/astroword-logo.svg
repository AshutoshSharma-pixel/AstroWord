<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 150">
  <defs>
    <!-- Background Gradient for dark theme context -->
    <!-- Removed rect background so it works on any dark surface, but keeping definition if needed -->
    
    <!-- Gold Gradient for the main icon and "Word" text -->
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFDF73" />
      <stop offset="50%" stop-color="#C9A84C" />
      <stop offset="100%" stop-color="#8B7333" />
    </linearGradient>

    <!-- Subtle glow effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Group for the entire logo -->
  <g transform="translate(10, 25)">
    
    <!-- 1. The Astrological Icon (Left side) -->
    <g transform="translate(10, 5)">
      <!-- Outer circle / Zodiac wheel base -->
      <circle cx="45" cy="45" r="40" fill="none" stroke="url(#goldGradient)" stroke-width="2" opacity="0.4" />
      <circle cx="45" cy="45" r="32" fill="none" stroke="url(#goldGradient)" stroke-width="1" stroke-dasharray="4 4" opacity="0.6" />
      
      <!-- Central geometric/mystical elements -->
      <!-- Upward triangle (Fire/Spirit) -->
      <polygon points="45,15 70,60 20,60" fill="none" stroke="url(#goldGradient)" stroke-width="2.5" />
      <!-- Downward triangle (Water/Matter) - creating a hexagram/yantra feel -->
      <polygon points="45,75 20,30 70,30" fill="none" stroke="url(#goldGradient)" stroke-width="2.5" opacity="0.8" />
      
      <!-- Center point / bindu -->
      <circle cx="45" cy="45" r="4" fill="#FFFFFF" filter="url(#glow)" />
      
      <!-- Orbiting planetary bodies -->
      <circle cx="15" cy="20" r="3" fill="#FFFFFF" opacity="0.8" />
      <circle cx="75" cy="70" r="4" fill="url(#goldGradient)" filter="url(#glow)" />
      <circle cx="80" cy="25" r="2" fill="#FFFFFF" opacity="0.5" />
      
      <!-- Minimalist orbit lines -->
      <path d="M 10,45 A 35,15 0 0,1 80,45" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.3" transform="rotate(-30 45 45)" />
    </g>

    <!-- 2. The Typography (Right side) -->
    <g transform="translate(125, 68)">
      <!-- "Astro" in clean, modern sans-serif (white) -->
      <!-- Since standard fonts might not render identically everywhere, converting approximate path or using standard system fonts -->
      <text x="0" y="0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="52" fill="#FFFFFF" letter-spacing="1">Astro</text>
      
      <!-- "Word" in elegant, italic serif (gold) -->
      <text x="135" y="0" font-family="'Playfair Display', 'Georgia', serif" font-weight="600" font-style="italic" font-size="54" fill="url(#goldGradient)" letter-spacing="0.5" filter="url(#glow)">Word</text>
      
      <!-- Tiny decorative star after the text -->
      <path d="M 285,-25 L 288,-35 L 298,-38 L 288,-41 L 285,-51 L 282,-41 L 272,-38 L 282,-35 Z" fill="url(#goldGradient)" transform="scale(0.5) translate(280, 20)" opacity="0.8" />
    </g>
    
  </g>
</svg>

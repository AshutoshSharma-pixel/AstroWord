<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5D07A;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F5D07A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0F1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080910;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="400" height="120" rx="16" fill="url(#bgGrad)"/>
  
  <!-- Subtle border -->
  <rect x="0.5" y="0.5" width="399" height="119" rx="15.5" fill="none" stroke="#C9A84C" stroke-opacity="0.3" stroke-width="1"/>

  <!-- Planet orbit icon -->
  <!-- Outer orbit ring -->
  <ellipse cx="58" cy="60" rx="38" ry="38" fill="none" stroke="#C9A84C" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Inner orbit ring -->
  <ellipse cx="58" cy="60" rx="24" ry="24" fill="none" stroke="#C9A84C" stroke-opacity="0.2" stroke-width="1"/>
  <!-- Diagonal orbit line -->
  <ellipse cx="58" cy="60" rx="38" ry="14" fill="none" stroke="#C9A84C" stroke-opacity="0.35" stroke-width="1" transform="rotate(-30 58 60)"/>
  
  <!-- Central sun -->
  <circle cx="58" cy="60" r="9" fill="url(#goldGrad)" filter="url(#softglow)"/>
  <circle cx="58" cy="60" r="6" fill="#F5D07A"/>
  
  <!-- Orbiting planet -->
  <circle cx="82" cy="38" r="5" fill="#C9A84C" filter="url(#glow)"/>
  
  <!-- Small stars around -->
  <circle cx="28" cy="35" r="1.5" fill="#F5D07A" opacity="0.8"/>
  <circle cx="88" cy="75" r="1" fill="#F5D07A" opacity="0.6"/>
  <circle cx="35" cy="82" r="1.2" fill="#F5D07A" opacity="0.5"/>
  <circle cx="78" cy="88" r="1" fill="#F5D07A" opacity="0.7"/>
  <circle cx="22" cy="58" r="0.8" fill="#F5D07A" opacity="0.5"/>

  <!-- ASTRO text -->
  <text 
    x="112" 
    y="68" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="38" 
    font-weight="700"
    letter-spacing="2"
    fill="white"
  >Astro</text>
  
  <!-- WORD text in gold italic -->
  <text 
    x="235" 
    y="68" 
    font-family="Georgia, 'Times New Roman', serif" 
    font-size="38" 
    font-weight="700"
    font-style="italic"
    letter-spacing="1"
    fill="url(#goldGrad)"
    filter="url(#glow)"
  >Word</text>

  <!-- Tagline -->
  <text 
    x="113" 
    y="88" 
    font-family="'Courier New', monospace" 
    font-size="9.5" 
    letter-spacing="3.5"
    fill="#C9A84C"
    opacity="0.7"
  >VEDIC AI PLATFORM</text>

  <!-- Small decorative dots -->
  <circle cx="113" cy="78" r="1" fill="#C9A84C" opacity="0.4"/>
  <circle cx="370" cy="78" r="1" fill="#C9A84C" opacity="0.4"/>
  
  <!-- Decorative line under tagline -->
  <line x1="113" y1="94" x2="370" y2="94" stroke="#C9A84C" stroke-opacity="0.15" stroke-width="0.5"/>

</svg>
